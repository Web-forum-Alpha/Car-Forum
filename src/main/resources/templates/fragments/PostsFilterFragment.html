<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<form th:fragment="filterForm" action="#" th:action="@{/posts}" method="get" class="filter-bar">

    <input type="text" name="title" placeholder="Search by title..."
           th:value="${param.title}"/>

    <input type="text" name="username" placeholder="Search by author..."
           th:value="${param.username}"/>

    <select name="sortBy">
        <option value="id" th:selected="${param.sortBy == null || param.sortBy[0] == 'id'}">Newest</option>
        <option value="title" th:selected="${param.sortBy != null && param.sortBy[0] == 'title'}">Title</option>
        <option value="likes" th:selected="${param.sortBy != null && param.sortBy[0] == 'likes'}">Most Liked</option>
        <option value="comments" th:selected="${param.sortBy != null && param.sortBy[0] == 'comments'}">Most Commented</option>
    </select>

    <select name="orderBy">
        <option value="desc" th:selected="${param.orderBy == null || param.orderBy[0] == 'desc'}">Descending</option>
        <option value="asc" th:selected="${param.orderBy != null && param.orderBy[0] == 'asc'}">Ascending</option>
    </select>

    <button type="submit">Filter</button>
    <a th:href="@{/posts}" class="clear-filter">Clear</a>

</form>

</body>
</html>
