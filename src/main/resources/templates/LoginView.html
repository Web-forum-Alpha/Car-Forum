<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<form th:action="@{/users/login}"
      th:object="${loginDto}"
      method="post">

    <div>
        <label for="username">Username</label>

        <input id="username"
               type="text"
               th:field="*{username}">

        <p th:if="${#fields.hasErrors('username')}"
           th:errors="*{username}">
        </p>
    </div>

    <div>
        <label for="password">Password</label>

        <input id="password"
               type="password"
               th:field="*{password}">

        <p th:if="${#fields.hasErrors('password')}"
           th:errors="*{password}">
        </p>
    </div>

    <p th:if="${errorMessage}"
       th:text="${errorMessage}">
    </p>

    <button type="submit">Login</button>

    <a th:href="@{/users/register}">Register</a>

</form>

</body>
</html>
